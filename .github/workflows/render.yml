name: Render blog posts

on:
  push:
    branches: [master]
    paths:
      - "blog_posts/**/source.md"

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc
        run: sudo apt-get install -y pandoc

      - name: Render blog posts
        # Redirect stdin so render_blog.py's input() call fails loudly
        # rather than hanging, if metadata is ever out of sync.
        run: python3 render_blog.py </dev/null

      - name: Commit rendered HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/blog_posts/ docs/blog_metadata.json docs/ticks.json
          git diff --cached --quiet || git commit -m "render blog posts [skip ci]"
          git push
