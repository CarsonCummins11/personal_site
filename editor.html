<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Blog Post Editor</title>
        <link rel="stylesheet" href="editor.css" />
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    </head>
    <body>
        <header><h1>Blog Post Editor</h1></header>
        <div class="container">
            <form id="post-form">
                <div class="load-row">
                    <div class="field">
                        <label for="post-select">Edit existing</label>
                        <select id="post-select">
                            <option value="">— new post —</option>
                        </select>
                    </div>
                    <button
                        type="button"
                        class="load-btn"
                        id="load-btn"
                        disabled
                    >
                        Load
                    </button>
                </div>
                <input type="hidden" id="edit-mode" name="edit" value="" />
                <div class="fields">
                    <div class="field">
                        <label for="title">Title</label>
                        <input
                            type="text"
                            id="title"
                            name="title"
                            placeholder="My Adventure Post"
                            required
                        />
                    </div>
                    <div class="field">
                        <label for="slug">Folder slug</label>
                        <input
                            type="text"
                            id="slug"
                            name="slug"
                            placeholder="adventure_jun19"
                            required
                        />
                        <span class="hint"
                            >blog_posts/<span id="slug-preview">…</span
                            >/source.md</span
                        >
                    </div>
                    <div class="field">
                        <label for="date">Date</label>
                        <input type="date" id="date" name="date" required />
                    </div>
                </div>
                <div class="editor-panes">
                    <div>
                        <div class="pane-label">Markdown</div>
                        <textarea
                            id="md"
                            name="markdown"
                            placeholder="Write your post in Markdown…"
                            required
                        ></textarea>
                    </div>
                    <div>
                        <div class="pane-label">Preview</div>
                        <div class="preview" id="preview"></div>
                    </div>
                </div>
                <div
                    class="existing-img-section"
                    id="existing-img-section"
                    style="display: none"
                >
                    <div class="pane-label">Existing images</div>
                    <div class="existing-img-list" id="existing-img-list"></div>
                </div>
                <div class="image-section">
                    <div class="pane-label">Upload new images</div>
                    <input
                        type="file"
                        id="image-input"
                        accept="image/*"
                        multiple
                        style="display: none"
                    />
                    <button
                        type="button"
                        class="add-images-btn"
                        id="add-images-btn"
                    >
                        + Add images
                    </button>
                    <div class="image-list" id="image-list"></div>
                </div>
                <div class="actions">
                    <button type="submit" id="submit-btn">Publish</button>
                    <span class="status" id="status"></span>
                </div>
            </form>
        </div>
        <script src="editor.js"></script>
    </body>
</html>
